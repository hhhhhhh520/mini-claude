# Mini Claude Code CI/CD Pipeline
# Runs tests on push, PR, and schedule

name: Test Suite

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, develop]
  schedule:
    # Daily regression tests at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full
          - coverage

env:
  PYTHON_VERSION: '3.10'

jobs:
  # Job 1: Lint and format check
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

  # Job 2: Unit tests (fast feedback)
  unit-tests:
    name: Unit Tests
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v -m "unit or not integration and not e2e and not stress and not chaos" \
            --tb=short \
            --junitxml=reports/junit/unit-tests.xml \
            --cov=src/mini_claude \
            --cov-report=xml:reports/coverage/unit-coverage.xml \
            --cov-report=html:reports/coverage/html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: reports/
          retention-days: 7

  # Job 3: Integration tests (on PR)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration -v \
            --tb=short \
            --junitxml=reports/junit/integration-tests.xml \
            --cov=src/mini_claude \
            --cov-report=xml:reports/coverage/integration-coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/
          retention-days: 7

  # Job 4: Full regression (daily or manual)
  regression-tests:
    name: Full Regression
    runs-on: ubuntu-latest
    needs: lint
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test_mode == 'full')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full regression suite
        run: |
          python scripts/run_regression.py --full --fail-on-regression
        continue-on-error: true

      - name: Upload regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: reports/
          retention-days: 30

      - name: Check for regressions
        if: always()
        run: |
          if [ -f reports/regression_*.json ]; then
            python -c "
            import json
            import glob
            files = glob.glob('reports/regression_*.json')
            if files:
                with open(files[0]) as f:
                    data = json.load(f)
                if data.get('total_failed', 0) > 0:
                    print('::error::Regression tests failed')
                    exit(1)
            "
          fi

  # Job 5: Coverage report (PR only)
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run coverage
        run: |
          python -m pytest tests/ \
            --cov=src/mini_claude \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true

  # Job 6: Notify on failure (for scheduled runs)
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, regression-tests]
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Scheduled test run failed - ' + new Date().toISOString().split('T')[0],
              body: 'The scheduled regression test run has failed.\n\n' +
                    'Check the workflow run: ' + process.env.GITHUB_SERVER_URL + '/' +
                    context.repo.owner + '/' + context.repo.repo + '/actions/runs/' +
                    context.runId,
              labels: ['ci-failure', 'automated']
            })
